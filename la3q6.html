<!DOCTYPE html>
<html>
<head>
<title>la3 q6</title>

<style>
body{
    font-family: Arial;
    background-color:#f2f2f2;
}

h2{
    text-align:center;
}

form{
    background:white;
    padding:15px;
    width:300px;
    margin:auto;
    border-radius:8px;
    box-shadow:0px 0px 5px gray;
}

input,select{
    width:100%;
    padding:5px;
    margin:5px 0;
}

button{
    padding:6px 10px;
    margin-top:5px;
}

table{
    border-collapse:collapse;
    margin:20px auto;
    width:70%;
}

th,td{
    border:1px solid black;
    padding:8px;
    text-align:center;
}

th{
    background:#4CAF50;
    color:white;
}
</style>

<script>

var students = [];   // global array

function Student(name,age,course){
    this.name = name;
    this.age = age;
    this.course = course;

    this.display = function(){
        return "<tr><td>"+this.name+"</td><td>"+this.age+"</td><td>"+this.course+"</td></tr>";
    }
}

function addStudent(form){

    var name = form.elements["name"].value;
    var age = form.elements["age"].value;
    var course = form.elements["course"].value;

    var studentObj = new Student(name,age,course);

    students.push(studentObj);

    showStudents();

    form.reset();

    form.elements["name"].focus();
}

function showStudents(){

    var tableData = "<tr><th>Name</th><th>Age</th><th>Course</th></tr>";

    for(var i=0;i<students.length;i++)
    {
        tableData += students[i].display();
    }

    document.getElementById("studentTable").innerHTML = tableData;
}

</script>

</head>

<body>
<h2>Aachman Dwivedi, 24BCI0207</h2>
<h2>Student Information System</h2>

<form>

Name:
<input type="text" name="name" required>

Age:
<input type="number" name="age">

Course:
<select name="course">
<option>B.Tech</option>
<option>BCA</option>
<option>MCA</option>
<option>MBA</option>
</select>

<button type="button" onclick="addStudent(this.form)">Add Student</button>
<button type="reset">Clear</button>

</form>

<table id="studentTable"></table>

</body>
</html>
